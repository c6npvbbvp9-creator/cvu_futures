name: Daily CME Futures Update

on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch:

jobs:
  update-futures:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      - name: Instalar dependências do sistema para Playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libxcomposite1 libxdamage1 libxfixes3 libxkbcommon0 libxrandr2 \
            xvfb

      - name: Instalar navegador Chromium (Playwright)
        run: python -m playwright install chromium


      - name: Upload screenshots de debug
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: debug_output/
          retention-days: 1

      - name: Executar coleta e atualizar Excel
        run: python main.py

      - name: Commitar Excel atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/CME_Futures_Database.xlsx
          git diff --cached --quiet || git commit -m "data: atualização CME Futures $(date +'%Y-%m-%d')"
          git push
